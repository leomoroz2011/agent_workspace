<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prospect Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body class="bg-neutral-950 text-white min-h-screen antialiased">

  <!-- Header -->
  <header class="border-b border-neutral-800 px-6 py-4 sticky top-0 bg-neutral-950/95 backdrop-blur z-40">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-sm font-bold">PF</div>
        <div>
          <h1 class="font-semibold text-sm">Prospect Finder</h1>
          <p class="text-xs text-neutral-500">SF barbershop leads for Leo</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <span id="seen-count" class="text-xs text-neutral-600"></span>
        <div id="api-status" class="text-xs text-neutral-500 flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-neutral-600 inline-block"></span>
          checking...
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-10">

    <!-- ── CONFIG ── -->
    <section id="config-section" class="fade-in">

      <!-- Step 1: Business Type -->
      <div class="mb-10">
        <p class="text-xs font-medium text-neutral-500 uppercase tracking-widest mb-4">Step 1 — What are you looking for?</p>
        <div class="grid grid-cols-3 gap-4">
          <button id="btn-barbershops" onclick="selectType('barbershops')"
            class="type-btn text-left p-5 rounded-xl border border-neutral-800 bg-neutral-900 hover:border-blue-500 transition-all cursor-pointer">
            <div class="text-3xl mb-3">✂️</div>
            <div class="font-semibold text-sm">Barbershops</div>
            <div class="text-xs text-neutral-500 mt-1">Hair + grooming</div>
          </button>
          <button id="btn-pet-groomers" onclick="selectType('pet-groomers')"
            class="type-btn text-left p-5 rounded-xl border border-neutral-800 bg-neutral-900 hover:border-blue-500 transition-all cursor-pointer">
            <div class="text-3xl mb-3">🐕</div>
            <div class="font-semibold text-sm">Pet Groomers</div>
            <div class="text-xs text-neutral-500 mt-1">Dog + cat grooming</div>
          </button>
          <button id="btn-cafes" onclick="selectType('cafes')"
            class="type-btn text-left p-5 rounded-xl border border-neutral-800 bg-neutral-900 hover:border-blue-500 transition-all cursor-pointer">
            <div class="text-3xl mb-3">☕</div>
            <div class="font-semibold text-sm">Cafes</div>
            <div class="text-xs text-neutral-500 mt-1">Coffee + bakeries</div>
          </button>
        </div>
      </div>

      <!-- Step 2: Neighborhoods -->

        <div class="flex items-center justify-between mb-4">

          <button onclick="toggleAllHoods()" id="toggle-all-btn"
            class="text-xs font-medium text-blue-400 hover:text-blue-300 transition-all">
            Select All SF
          </button>
        </div>

          </label>

          </label>

            <div><div class="font-medium text-sm">Glen Park</div><div class="text-xs text-neutral-500">Diamond St · village feel</div></div>
          </label>
          <label class="flex items-center gap-3 p-3 rounded-xl border border-neutral-800 bg-neutral-900 cursor-pointer hover:border-blue-500 transition-all">

            <div><div class="font-medium text-sm">West Portal</div><div class="text-xs text-neutral-500">West Portal Ave</div></div>
          </label>
          <label class="flex items-center gap-3 p-3 rounded-xl border border-neutral-800 bg-neutral-900 cursor-pointer hover:border-blue-500 transition-all">
            <input type="checkbox" value="soma" class="hood-check w-4 h-4 accent-blue-500" />
            <div><div class="font-medium text-sm">SoMa</div><div class="text-xs text-neutral-500">South of Market</div></div>
          </label>
          <label class="flex items-center gap-3 p-3 rounded-xl border border-neutral-800 bg-neutral-900 cursor-pointer hover:border-blue-500 transition-all">
            <input type="checkbox" value="visitacion-valley" class="hood-check w-4 h-4 accent-blue-500" />

          </label>

      <button onclick="runAnalysis()"
        class="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.99] text-white py-4 rounded-xl font-semibold text-sm transition-all shadow-lg shadow-blue-600/20">
        Find My Top 20 Prospects →
      </button>

      <button onclick="clearMemory()"
        class="w-full mt-3 py-3 rounded-xl text-xs text-neutral-600 hover:text-neutral-400 transition-all">
        Reset memory — show all prospects again
      </button>

    </section>

    <!-- ── PROGRESS ── -->
    <section id="progress-section" class="hidden fade-in">
      <div class="bg-neutral-900 border border-neutral-800 rounded-2xl p-8">
        <div class="flex items-center justify-between mb-2">
          <h2 id="progress-title" class="font-semibold text-sm">Searching Google Maps...</h2>
          <span id="progress-count" class="text-xs text-neutral-500 tabular-nums"></span>
        </div>
        <div class="w-full bg-neutral-800 rounded-full h-1.5 mb-6 overflow-hidden">
          <div id="progress-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-500" style="width:0%"></div>
        </div>
        <div id="progress-log" class="space-y-1.5 max-h-72 overflow-y-auto text-xs text-neutral-400 font-mono"></div>
      </div>
    </section>

    <!-- ── RESULTS ── -->
    <section id="results-section" class="hidden fade-in">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="font-bold text-lg">Top Prospects</h2>
          <p id="results-subtitle" class="text-sm text-neutral-500 mt-0.5"></p>
        </div>
        <div class="flex gap-2">
          <button onclick="exportCSV()"
            class="px-4 py-2 bg-neutral-900 border border-neutral-800 rounded-lg text-xs font-medium hover:border-blue-500 transition-all">
            Download CSV
          </button>
          <button onclick="resetTool()"
            class="px-4 py-2 bg-neutral-900 border border-neutral-800 rounded-lg text-xs font-medium hover:border-neutral-600 transition-all text-neutral-400">
            Start Over
          </button>
        </div>
      </div>

      <div class="bg-neutral-900 border border-neutral-800 rounded-2xl overflow-hidden">
        <table class="w-full">
          <thead>
            <tr class="border-b border-neutral-800">
              <th class="text-left text-xs text-neutral-500 font-medium px-5 py-3 uppercase tracking-wider w-8">#</th>
              <th class="text-left text-xs text-neutral-500 font-medium px-4 py-3 uppercase tracking-wider">Business</th>
              <th class="text-left text-xs text-neutral-500 font-medium px-4 py-3 uppercase tracking-wider">Address</th>
              <th class="text-left text-xs text-neutral-500 font-medium px-4 py-3 uppercase tracking-wider">Web</th>
              <th class="text-left text-xs text-neutral-500 font-medium px-4 py-3 uppercase tracking-wider">Source</th>
              <th class="text-center text-xs text-neutral-500 font-medium px-4 py-3 uppercase tracking-wider">Conv %</th>
            </tr>
          </thead>
          <tbody id="results-tbody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <script>
    let selectedType = 'barbershops';
    let prospects = [];
    let healthData = {};

    async function init() {
      selectType('barbershops');
      try {
        healthData = await fetch('/api/health').then(r => r.json());
        const el = document.getElementById('api-status');
        const sources = [healthData.serpapi && 'Google', healthData.yelp && 'Yelp'].filter(Boolean);
        if (sources.length) {
          el.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-green-500 inline-block"></span> ' + sources.join(' + ') + ' ready';
          el.className = 'text-xs text-green-400 flex items-center gap-1.5';
        } else {
          el.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-red-500 inline-block"></span> No API keys configured';
          el.className = 'text-xs text-red-400 flex items-center gap-1.5';
        }
        if (healthData.seen > 0) {
          document.getElementById('seen-count').textContent = healthData.seen + ' prospects in memory';
        }
      } catch {}
    }

    function selectType(type) {
      selectedType = type;
      document.querySelectorAll('.type-btn').forEach(btn => {
        btn.classList.remove('border-blue-500', 'bg-blue-950');
        btn.classList.add('border-neutral-800', 'bg-neutral-900');
      });
      const btn = document.getElementById('btn-' + type);
      btn.classList.remove('border-neutral-800', 'bg-neutral-900');
      btn.classList.add('border-blue-500', 'bg-blue-950');
    }

    function getNeighborhoods() {
      return Array.from(document.querySelectorAll('.hood-check:checked')).map(el => el.value);
    }

    function toggleAllHoods() {
      const all = document.querySelectorAll('.hood-check');
      const anyUnchecked = Array.from(all).some(el => !el.checked);
      all.forEach(el => el.checked = anyUnchecked);
      document.getElementById('toggle-all-btn').textContent = anyUnchecked ? 'Deselect All' : 'Select All SF';
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = String(str);
      return d.innerHTML;
    }

    function logLine(msg, type) {
      const el = document.getElementById('progress-log');
      const div = document.createElement('div');
      div.className = type === 'success' ? 'text-green-400' : type === 'error' ? 'text-red-400' : type === 'dim' ? 'text-neutral-600' : 'text-neutral-400';
      div.textContent = msg;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    function setProgress(current, total, title) {
      if (title) document.getElementById('progress-title').textContent = title;
      const pct = total ? Math.round((current / total) * 100) : 5;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-count').textContent = total ? current + ' / ' + total : '';
    }

    async function post(url, data) {
      const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      const json = await r.json();
      if (!r.ok) throw new Error(json.error || r.statusText);
      return json;
    }

    async function runAnalysis() {
      const neighborhoods = getNeighborhoods();
      if (!neighborhoods.length) { alert('Pick at least one neighborhood.'); return; }

      document.getElementById('config-section').classList.add('hidden');
      document.getElementById('progress-section').classList.remove('hidden');
      document.getElementById('results-section').classList.add('hidden');
      document.getElementById('progress-log').innerHTML = '';

      try {
        const sources = [healthData.serpapi && 'Google', healthData.yelp && 'Yelp'].filter(Boolean);
        setProgress(0, null, 'Searching ' + sources.join(' + ') + '...');
        logLine('Searching ' + neighborhoods.length + ' neighborhood(s) via ' + sources.join(' + ') + '...');

        const { businesses, skipped } = await post('/api/search', { businessType: selectedType, neighborhoods });

        if (skipped > 0) logLine(skipped + ' already-found prospects skipped.', 'dim');
        logLine('Found ' + businesses.length + ' new businesses.', 'success');
        logLine('');

        if (!businesses.length) {
          logLine('No new results — try more neighborhoods or reset memory.', 'error');
          setTimeout(() => {
            document.getElementById('config-section').classList.remove('hidden');
            document.getElementById('progress-section').classList.add('hidden');
          }, 3000);
          return;
        }

        // Analyze in batches of 3
        const analyzed = [];
        setProgress(0, businesses.length, 'Checking websites...');

        for (let i = 0; i < businesses.length; i += 3) {
          const batch = businesses.slice(i, i + 3);
          const results = await Promise.all(batch.map(b => post('/api/analyze', { business: b }).catch(() => null)));

          for (let j = 0; j < results.length; j++) {
            const r = results[j];
            if (!r) { logLine('  Skipped: ' + batch[j].name, 'dim'); continue; }
            analyzed.push(r);
            const tag = !r.hasRealWebsite ? (r.hasSocialOnly ? '(social only)' : '(no website)') : '(site ' + r.websiteScore + '/10)';
            logLine('  ' + r.conversionScore + '% — ' + r.name + ' ' + tag, 'success');
          }

          setProgress(Math.min(i + 3, businesses.length), businesses.length, 'Checking websites...');
        }

        const worthCalling = analyzed.filter(p => p.conversionScore >= 45);
        const filtered = analyzed.length - worthCalling.length;
        if (filtered > 0) logLine(filtered + ' skipped — decent websites, not worth calling.', 'dim');
        prospects = worthCalling.sort((a, b) => b.conversionScore - a.conversionScore).slice(0, 20);

        // Mark as seen
        await post('/api/seen', { ids: prospects.map(p => p.id) });
        document.getElementById('seen-count').textContent = (skipped + prospects.length) + ' prospects in memory';

        setProgress(100, 100, 'Done.');
        logLine('');
        logLine('Top ' + prospects.length + ' prospects ready.', 'success');
        setTimeout(showResults, 700);

      } catch (err) {
        logLine('Error: ' + err.message, 'error');
        setProgress(0, 1, 'Error');
        setTimeout(() => {
          document.getElementById('config-section').classList.remove('hidden');
          document.getElementById('progress-section').classList.add('hidden');
        }, 3000);
      }
    }

    function showResults() {
      document.getElementById('progress-section').classList.add('hidden');
      document.getElementById('results-section').classList.remove('hidden');
      document.getElementById('results-subtitle').textContent = prospects.length + ' prospects ranked by conversion likelihood';

      const tbody = document.getElementById('results-tbody');
      tbody.innerHTML = '';

      prospects.forEach((p, i) => {
        const scoreColor = p.conversionScore >= 70 ? 'text-green-400' : p.conversionScore >= 45 ? 'text-yellow-400' : 'text-red-400';

        let webBadge = '';
        if (!p.hasRealWebsite && !p.hasSocialOnly)
          webBadge = '<span class="text-xs bg-red-500/15 text-red-400 px-2 py-0.5 rounded-full">No website</span>';
        else if (p.hasSocialOnly)
          webBadge = '<span class="text-xs bg-orange-500/15 text-orange-400 px-2 py-0.5 rounded-full">Social only</span>';
        else {
          const cls = p.websiteScore <= 4 ? 'text-orange-400 bg-orange-500/15' : p.websiteScore <= 6 ? 'text-yellow-400 bg-yellow-500/15' : 'text-green-400 bg-green-500/15';
          webBadge = '<span class="text-xs ' + cls + ' px-2 py-0.5 rounded-full">Site ' + p.websiteScore + '/10</span>';
        }

        const tr = document.createElement('tr');
        tr.className = 'border-b border-neutral-800/50 hover:bg-neutral-800/30 transition-all';
        const srcBadge = p.source === 'yelp'
          ? '<span class="text-xs bg-red-500/15 text-red-300 px-2 py-0.5 rounded-full">Yelp</span>'
          : '<span class="text-xs bg-blue-500/15 text-blue-400 px-2 py-0.5 rounded-full">Google</span>';

        tr.innerHTML = `
          <td class="px-5 py-4 text-neutral-600 text-sm tabular-nums">${i + 1}</td>
          <td class="px-4 py-4">
            <div class="font-medium text-sm">${esc(p.name)}</div>
            <div class="text-xs text-neutral-500 mt-0.5">${esc(p.phone || '—')}</div>
          </td>
          <td class="px-4 py-4 text-xs text-neutral-400 max-w-xs">${esc(p.address)}</td>
          <td class="px-4 py-4">${webBadge}</td>
          <td class="px-4 py-4">${srcBadge}</td>
          <td class="px-4 py-4 text-center">
            <span class="font-bold text-sm tabular-nums ${scoreColor}">${p.conversionScore}%</span>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function exportCSV() {
      const btn = document.querySelector('[onclick="exportCSV()"]');
      const orig = btn.textContent;
      btn.textContent = 'Saving...';
      btn.disabled = true;
      try {
        const result = await post('/api/export', { prospects, businessType: selectedType });
        if (result.success) {
          btn.textContent = 'Saved!';
          btn.classList.add('text-green-400');
          const sub = document.getElementById('results-subtitle');
          sub.textContent = 'Saved to "' + result.folder + '" folder on your Desktop';
          sub.classList.add('text-green-400');
          setTimeout(() => {
            btn.textContent = orig; btn.disabled = false; btn.classList.remove('text-green-400');
            sub.classList.remove('text-green-400');
          }, 3000);
        }
      } catch {
        btn.textContent = 'Error — try again';
        setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
      }
    }

    async function clearMemory() {
      if (!confirm('This will reset memory and show all prospects again — including ones you\'ve already found. Continue?')) return;
      await fetch('/api/seen', { method: 'DELETE' });
      document.getElementById('seen-count').textContent = '';
      alert('Memory cleared.');
    }

    function resetTool() {
      prospects = [];
      document.getElementById('progress-log').innerHTML = '';
      document.getElementById('config-section').classList.remove('hidden');
      document.getElementById('progress-section').classList.add('hidden');
      document.getElementById('results-section').classList.add('hidden');
    }

    init();
  </script>
</body>
</html>
